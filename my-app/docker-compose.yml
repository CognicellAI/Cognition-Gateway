services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/data/gateway.db"
      NEXTAUTH_URL: "http://localhost:3000"
      # Generate a strong random secret: openssl rand -base64 32
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-change-me-in-production}"
      REGISTRATION_ENABLED: "${REGISTRATION_ENABLED:-true}"
      COGNITION_SERVER_URL: "${COGNITION_SERVER_URL:-http://cognition:8000}"
    volumes:
      - gateway_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/setup"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  gateway_data:
